apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: openmpi-cuda
  labels:
    trainer.kubeflow.org/framework: openmpi
spec:
  mlPolicy:
    numNodes: 1
    mpi:
      numProcPerNode: 1
      mpiImplementation: OpenMPI
      sshAuthMountPath: /home/mpiuser/.ssh
      runLauncherAsNode: true
  template:
    spec:
      network:
        publishNotReadyAddresses: true
      successPolicy:
        operator: All
        targetReplicatedJobs:
          - launcher
      replicatedJobs:
        - groupName: default
          name: launcher
          replicas: 1
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                spec:
                  containers:
                    - name: node
                      image: quay.io/ksuta/odh-mpi-cuda:0.0.14
                      env:
                        - name: OMPI_MCA_mtl
                          value: ^ofi
                        - name: OMPI_MCA_btl
                          value: tcp,self
                      resources:
                        limits:
                          nvidia.com/gpu: "1"
                        requests:
                          nvidia.com/gpu: "1"
        - groupName: default
          name: node
          replicas: 1
          template:
            spec:
              template:
                spec:
                  containers:
                    - name: node
                      image: quay.io/ksuta/odh-mpi-cuda:0.0.14
                      command:
                        - /usr/local/bin/uid_entrypoint.sh
                        - /usr/sbin/sshd
                      args:
                        - -De
                        - -f
                        - /home/mpiuser/.sshd_config
                      env:
                        - name: OMPI_MCA_mtl
                          value: ^ofi
                        - name: OMPI_MCA_btl
                          value: tcp,self
                      readinessProbe:
                        initialDelaySeconds: 3
                        tcpSocket:
                          port: 2222
                      resources:
                        limits:
                          nvidia.com/gpu: "1"
                        requests:
                          nvidia.com/gpu: "1"
